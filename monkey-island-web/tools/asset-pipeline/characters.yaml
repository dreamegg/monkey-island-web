# =============================================================================
# Character Identity Definitions
# Used by generate_characters.py for consistent multi-variant generation.
#
# Each character has:
#   identity:   The canonical physical description (clothes, hair, face structure).
#               This text is used UNCHANGED for every variant so the model anchors
#               to the same appearance via img2img.
#   base_seed:  Seed for the canonical base image generation (txt2img, phase 1).
#   portraits:  Expression variants. Only the `expression` field changes.
#   sprites:    Pose variants for walk cycle. Only the `pose` field changes.
#
# img2img strengths:
#   portrait variants:  0.50  (face shape preserved, expression can shift)
#   sprite walk frames: 0.65  (body proportions preserved, pose can shift)
# =============================================================================

