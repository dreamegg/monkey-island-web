# =============================================================================
# Monkey Island Web - Asset Generation Prompts
# FLUX.1-dev + PixelArt LoRA (nerijs/pixel-art-xl)
# =============================================================================
# Usage:
#   python generate.py --type background --name harbor
#   python generate.py --type all --batch
#   python generate.py --batch prompts.yaml
# =============================================================================

# ---------------------------------------------------------------------------
# Shared style suffix injected into every prompt
# ---------------------------------------------------------------------------
style:
  pixel_art_base: >-
    pixel art, 16-bit era, lucasarts point-and-click adventure game style,
    EGA palette, crisp pixels, no anti-aliasing, retro game aesthetic,
    monkey island inspired
  negative_base: >-
    3d render, realistic, photograph, blurry, anti-aliased, smooth gradients,
    modern art style, watermark, text overlay, UI elements, HUD

# ---------------------------------------------------------------------------
# BACKGROUNDS  (source: 320×200 → display: 640×400 @ 2x, 32 colors)
# ---------------------------------------------------------------------------
backgrounds:
  harbor:
    name: harbor
    seed: 1001
    description: >-
      pirate harbor at dusk, weathered wooden dock extending into calm dark water,
      tall sailing ship with skull flag anchored nearby, flickering torch lights
      on dock posts, moonlight reflecting on water ripples, barrels and crates
      stacked on dock, distant island silhouette, atmospheric fog near water surface,
      dramatic sky with clouds and stars emerging
    notes: "Room 1 - starting location"

  tavern:
    name: tavern
    seed: 1002
    description: >-
      interior of a dimly lit pirate tavern, long wooden bar counter on the right,
      shelves of rum bottles and grog mugs behind bar, large chandelier with
      candles hanging from low ceiling, wooden tables and stools, treasure map
      pinned to the wall, wanted posters, barrels in corner, warm orange candlelight,
      smoke-filled atmosphere, creaky wooden floor planks
    notes: "Room 2 - SCUMM bar interior"

  forest:
    name: forest
    seed: 1003
    description: >-
      dense tropical jungle path at night, tall palm trees and exotic foliage
      forming a canopy, mysterious fireflies, ancient stone ruins visible through
      trees, winding dirt path leading deeper into forest, giant mushrooms glowing
      softly, twisted roots across the path, eerie green mist near ground,
      glimpse of starry sky through tree gaps
    notes: "Room 3 - forest trail"

  beach:
    name: beach
    seed: 1004
    description: >-
      tropical beach at night with white sand and lapping ocean waves, three
      tall palm trees leaning over beach, large skull-shaped rock formation on
      right side, crackling pirate campfire with embers, moonlit ocean stretching
      to horizon, dark cave entrance in cliff face on left, small beach crabs,
      seashells and driftwood on sand, starry sky with large tropical moon
    notes: "Room 4 - beach area"

  cave:
    name: cave
    seed: 1005
    description: >-
      dark mysterious cave interior, dramatic stalactites hanging from high ceiling,
      underground river flowing through center with glowing bioluminescent water,
      large crystal formations catching light, ancient carved stone steps descending,
      glowing mushrooms providing dim purple-green light, bats roosting in shadows,
      cave walls with old pirate markings and carvings, mysterious treasure chest
      partially visible in background
    notes: "Room 5 - underground cave"

# ---------------------------------------------------------------------------
# CHARACTER SPRITES  (source: 32×48/frame → display: 64×96 @ 2x, 16 colors)
# Walk cycles: 4 directions × 4 frames = 16 frames per character
# ---------------------------------------------------------------------------
characters:
  guybrush:
    name: guybrush
    seed: 2001
    description: >-
      young lanky blonde pirate hero, determined cheerful expression, wearing
      red long-sleeved shirt with white collar, blue baggy pants, brown leather
      boots, small brown belt, side profile walking pose, arms swinging naturally,
      transparent background, single character centered
    walk_cycle:
      directions: [south, north, west, east]
      frames_per_direction: 4
    notes: "Main protagonist - Guybrush Threepwood"

  lechuck:
    name: lechuck
    seed: 2002
    description: >-
      ghost pirate captain, glowing ethereal blue-green aura, large tattered
      pirate captain coat with gold buttons, massive black beard made of shadow
      and smoke, glowing red menacing eyes, undead skeletal hands, imposing tall
      figure, dramatic ghostly trail, transparent background, single character centered
    walk_cycle:
      directions: [south, north, west, east]
      frames_per_direction: 4
    notes: "Main antagonist - LeChuck"

  elaine:
    name: elaine
    seed: 2003
    description: >-
      confident female governor, flowing auburn-brown hair, elegant but practical
      dress in deep blue with gold trim, determined confident pose, cape flowing
      behind, boots, beautiful but no-nonsense expression, transparent background,
      single character centered
    walk_cycle:
      directions: [south, north, west, east]
      frames_per_direction: 4
    notes: "Love interest - Governor Elaine Marley"

  voodoo_lady:
    name: voodoo_lady
    seed: 2004
    description: >-
      mysterious old voodoo woman, dark wrinkled skin, wild grey hair with
      colorful beads and bones woven in, flowing purple and black robes with
      voodoo symbols, necklace of bones and feathers, wise piercing eyes,
      hunched slightly but powerful presence, transparent background, centered
    walk_cycle:
      directions: [south]
      frames_per_direction: 2
    notes: "NPC - Voodoo Lady (limited movement)"

  bartender:
    name: bartender
    seed: 2005
    description: >-
      gruff pirate bartender, stocky build, bald head with red bandana,
      brown leather apron over striped shirt, thick arms, handlebar mustache,
      suspicious expression, holding a rag, transparent background, centered
    walk_cycle:
      directions: [south, west, east]
      frames_per_direction: 2
    notes: "NPC - Tavern bartender"

  three_pirates:
    name: three_pirates
    seed: 2006
    description: >-
      trio of generic pirate crew members sitting together, varied heights,
      ragged pirate clothes in muted earth tones, assorted hats and bandanas,
      weathered faces, sitting/idle pose, transparent background
    walk_cycle:
      directions: [south]
      frames_per_direction: 1
    notes: "NPC - Background pirates at tavern"

